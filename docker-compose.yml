# Local Postgres for development. Start with: docker compose up -d
# Then: npm run setup && npm run dev
services:
  db:
    image: postgres:16-alpine
    container_name: relay-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
      POSTGRES_DB: relay
    ports:
      - "5432:5432"
    volumes:
      - relay-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay -d relay"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  relay-pgdata:
